# Build settings
permalink   : /blog/:year/:title/
markdown    : kramdown
highlighter : pygments

paginate: 3
paginate_path: "/blog/page/:num/"
comments: true

source: source
destination: _site
sass:
  sass_dir: _scss
  style: compressed # expanded

# SEO settings
title: I'm Yang Bo
description: "A full-stack developer, Bootstrapper, Runner, Father and Husband"
keywords: "Jekyll, SEO, blog, web, ruby, rails"
#url: http://nandomoreira.me
#baseurl: "/home"
# baseurl: ""

google_analytics: UA-70112871-1
repo: http://github.com/y00rb/y00rb.github.io
disqus_shortname: "y00rb"

# Author settings
author:
  name      : Yang Bo
  job       : Full-stack Developer
  bio       : "I've been programming software for about 10 years now, I've been hitting many fields; I love running long distance"
  thumb     : /images/author.jpg
  email     : yangbodotnet@gmail.com
  url       : http://nandomoreira.me
  github    : https://github.com/y00rb
  twitter   : https://twitter.com/yangbodotnet
  facebook  : https://facebook.com/yangbodotnet
  linkedin  : https://linkedin.com/in/yangboruby

# navbar pages
navbar:
  - slug: about
    title: About
  # - slug: resume
  #   title: Resume
  # - slug: skills
  #   title: Skills
  - slug: blog
    title: Blog

exclude: ["gulp", "node_modules", "bower", "bower_components", "config.rb", "src", "Gemfile", "Gemfile.lock", ".rvmrc", ".rbenv-version", "package.json", "gulpfile.js", "README.md", "Rakefile", "changelog.md"]
